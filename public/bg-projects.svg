<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b0b1e"/>
      <stop offset="50%" stop-color="#1a0e2e"/>
      <stop offset="100%" stop-color="#0b0b1e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#c94ef0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="30%">
      <stop offset="0%" stop-color="#ff3ea5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <!-- Abstract hexagon pattern -->
  <g stroke="#ff3ea5" stroke-width="0.8" fill="none" opacity="0.1">
    <polygon points="960,100 1010,129 1010,187 960,216 910,187 910,129"/>
