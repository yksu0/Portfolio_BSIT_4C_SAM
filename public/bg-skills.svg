<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b0b1e"/>
      <stop offset="50%" stop-color="#0e1a2e"/>
      <stop offset="100%" stop-color="#0b0b1e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <!-- Perspective grid floor -->
  <g stroke="#00f5ff" stroke-width="0.5" opacity="0.15">
    <line x1="960" y1="540" x2="0" y2="1080"/>
    <line x1="960" y1="540" x2="192" y2="1080"/>
    <line x1="960" y1="540" x2="384" y2="1080"/>
    <line x1="960" y1="540" x2="576" y2="1080"/>
    <line x1="960" y1="540" x2="768" y2="1080"/>
    <line x1="960" y1="540" x2="1152" y2="1080"/>
    <line x1="960" y1="540" x2="1344" y2="1080"/>
    <line x1="960" y1="540" x2="1536" y2="1080"/>
    <line x1="960" y1="540" x2="1728" y2="1080"/>
    <line x1="960" y1="540" x2="1920" y2="1080"/>
  </g>
  <g stroke="#c94ef0" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="680" x2="1920" y2="680"/>
    <line x1="0" y1="770" x2="1920" y2="770"/>
    <line x1="0" y1="870" x2="1920" y2="870"/>
    <line x1="0" y1="980" x2="1920" y2="980"/>
  </g>
  <!-- Floating circuit-like elements -->
  <g stroke="#c94ef0" stroke-width="1" fill="none" opacity="0.12">
    <circle cx="300" cy="200" r="40"/>
    <circle cx="300" cy="200" r="20"/>
    <line x1="340" y1="200" x2="450" y2="200"/>
    <circle cx="1600" cy="300" r="30"/>
    <line x1="1570" y1="300" x2="1450" y2="300"/>
    <rect x="1440" y="290" width="20" height="20"/>
  </g>
</svg>